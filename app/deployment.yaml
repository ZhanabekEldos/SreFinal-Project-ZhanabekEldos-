apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: sre-project
spec:
  replicas: 2

  selector:
    matchLabels:
      app: sre-app

  template:
    metadata:
      labels:
        app: sre-app

    spec:
      containers:
      - name: sre-app
        image: eldoss/sre-app:latest

        ports:
        - containerPort: 80